<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Luna Maze Escape - 미로 탈출</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6C5CE7;
            --primary-light: #A29BFE;
            --accent: #00CEC9;
            --danger: #FF6B6B;
            --warning: #FDCB6E;
            --success: #00B894;
            --bg: #0F0F1A;
            --surface: #1A1A2E;
            --surface2: #25253D;
            --text: #E8E8F0;
            --text-dim: #8888AA;
            --gold: #FFD700;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            padding: 8px;
        }

        /* ========== HEADER ========== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            padding: 8px 12px;
            background: var(--surface);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .header-title {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .level-badge {
            background: var(--primary);
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        /* ========== INFO BAR ========== */
        .info-bar {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 8px;
        }
        .info-card {
            flex: 1;
            background: var(--surface);
            border-radius: 10px;
            padding: 8px 12px;
            text-align: center;
        }
        .info-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-value {
            font-size: 22px;
            font-weight: 700;
        }
        .info-value.moves { color: var(--accent); }
        .info-value.optimal { color: var(--gold); }
        .info-value.remaining { color: var(--warning); }
        .info-value.danger { color: var(--danger); }

        /* ========== MAZE ========== */
        .maze-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            min-height: 0;
        }

        canvas#mazeCanvas {
            border-radius: 12px;
            background: var(--surface);
        }

        /* ========== CONTROLS ========== */
        .controls {
            width: 100%;
            max-width: 500px;
            padding: 8px 0;
        }
        .dpad {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            width: 180px;
            height: 180px;
            margin: 0 auto;
            gap: 4px;
        }
        .dpad-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface2);
            border: 2px solid var(--primary);
            border-radius: 12px;
            color: var(--primary-light);
            font-size: 28px;
            cursor: pointer;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .dpad-btn:active, .dpad-btn.active {
            background: var(--primary);
            color: white;
            transform: scale(0.92);
        }
        .dpad-center {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 12px;
            cursor: default;
        }
        .dpad-empty { visibility: hidden; }

        .bottom-bar {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 500px;
            margin-top: 8px;
            padding-bottom: env(safe-area-inset-bottom, 8px);
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-reset {
            background: var(--surface2);
            color: var(--text-dim);
            border: 1px solid #333;
        }
        .btn-levels {
            background: var(--primary);
            color: white;
        }
        .btn-undo {
            background: var(--surface2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }
        .btn-solve {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #1A1A2E;
            font-weight: 700;
        }
        .btn-skip {
            background: var(--surface2);
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        .btn:active { transform: scale(0.95); opacity: 0.8; }

        /* ========== COIN DISPLAY ========== */
        .coin-display {
            display: flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #FFD70033, #FFA50022);
            border: 1px solid #FFD70055;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--gold);
        }
        .coin-icon { font-size: 14px; }
        .coin-anim {
            animation: coinBounce 0.4s ease;
        }
        @keyframes coinBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        /* ========== MODAL ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--surface);
            border-radius: 20px;
            padding: 28px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .modal h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .modal p {
            color: var(--text-dim);
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .modal .stars {
            font-size: 40px;
            margin: 12px 0;
        }
        .modal .stats {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .modal .stat {
            text-align: center;
        }
        .modal .stat-val {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }
        .modal .stat-label {
            font-size: 11px;
            color: var(--text-dim);
        }
        .modal-btn {
            display: inline-block;
            padding: 12px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 4px;
        }
        .modal-btn-primary {
            background: var(--primary);
            color: white;
        }
        .modal-btn-secondary {
            background: var(--surface2);
            color: var(--text);
        }

        /* ========== LEVEL SELECT ========== */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 16px 0;
            max-height: 50vh;
            overflow-y: auto;
            padding: 4px;
        }
        .level-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--surface2);
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s;
        }
        .level-cell.current { border-color: var(--primary); }
        .level-cell.locked { opacity: 0.3; pointer-events: none; }
        .level-cell .lnum { font-size: 18px; font-weight: 700; }
        .level-cell .lstars { font-size: 10px; margin-top: 2px; }
        .level-cell:active { transform: scale(0.9); }

        /* ========== GAME OVER ========== */
        .fail-text { color: var(--danger); }

        /* ========== SWIPE HINT ========== */
        .swipe-trail {
            position: absolute;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>

        <div class="header">

                <div class="dpad-empty"></div>

    <!-- Win Modal -->
    <div class="modal-overlay" id="winModal">
        <div class="modal">

            <div class="stars" id="winStars"></div>

                    <div class="stat-val" id="winMoves">0</div>

                    <div class="stat-val" id="winOptimal">0</div>
                    <div class="stat-label">Optimal</div>

            </div>
            <p id="winMsg"></p>

            <h2 class="fail-text">Out of Moves!</h2>

            <p style="margin:14px 0 6px;color:var(--text);font-size:15px;font-weight:600">빙판 미로를 탈출하라!</p>
            <div style="background:var(--surface2);border-radius:12px;padding:14px;margin:12px 0;text-align:left">
                <div style="margin-bottom:10px;display:flex;gap:10px;align-items:flex-start">
                    <span style="font-size:22px">⬆️</span>
                    <div><b style="color:var(--accent)">방향키를 누르면</b><br><span style="color:var(--text-dim);font-size:13px">벽에 부딪힐 때까지 쭉 미끄러져요!</span></div>
                </div>
                <div style="margin-bottom:10px;display:flex;gap:10px;align-items:flex-start">
                    <span style="font-size:22px">🟢</span>
                    <div><b style="color:var(--accent)">EXIT 칸에 도달</b>하면 클리어!<br><span style="color:var(--text-dim);font-size:13px">허용 횟수 안에 탈출해야 해요</span></div>

            <button class="modal-btn modal-btn-secondary" id="levelClose">Close</button>
        </div>

<script>
// ============================================================
//  LUNA MAZE ESCAPE — Ice Sliding Puzzle
// ============================================================

const CELL_WALL = 1;
const CELL_EMPTY = 0;
const CELL_EXIT = 2;

// ============================================================
//  SOUND EFFECTS — Web Audio API (no external files)
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSlide() {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(300, audioCtx.currentTime);
    o.frequency.linearRampToValueAtTime(500, audioCtx.currentTime + 0.08);
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.12);
}

function playBump() {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(120, audioCtx.currentTime);
    o.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.06);
    g.gain.setValueAtTime(0.12, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.08);
}

function playWin() {
    ensureAudio();
    const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.value = freq;
        g.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.12);
        g.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + i * 0.12 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.12 + 0.3);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(audioCtx.currentTime + i * 0.12);
        o.stop(audioCtx.currentTime + i * 0.12 + 0.3);
    });
}

function playFail() {
    ensureAudio();
    const notes = [400, 350, 300, 200];
    notes.forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sawtooth';
        o.frequency.value = freq;
        g.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.1);
        g.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + i * 0.1 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.1 + 0.2);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(audioCtx.currentTime + i * 0.1);
        o.stop(audioCtx.currentTime + i * 0.1 + 0.2);
    });
}

function playUndo() {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(500, audioCtx.currentTime);
    o.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.12);
}

function playCoin() {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(1200, audioCtx.currentTime);
    o.frequency.linearRampToValueAtTime(1800, audioCtx.currentTime + 0.08);
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.15);
}

function playBtn() {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = 600;
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.05);
}

// Direction vectors
const DIR = {
    up:    { dx: 0, dy: -1 },
    down:  { dx: 0, dy:  1 },
    left:  { dx: -1, dy: 0 },
    right: { dx:  1, dy: 0 }
};

// ============================================================
//  LEVEL GENERATION — procedural + BFS verified
// ============================================================

// Seeded PRNG for reproducible levels
function mulberry32(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

// Level specs: [gridSize, targetOptimal, allowedMoves, seed]
const LEVEL_SPECS = [
    [5,  2,  8,  100], // Lv1
    [5,  3, 10,  200], // Lv2
    [5,  3, 10,  300], // Lv3
    [6,  3, 10,  400], // Lv4
    [6,  4, 12,  500], // Lv5
    [7,  4, 12,  600], // Lv6
    [7,  5, 15,  700], // Lv7
    [7,  5, 15,  800], // Lv8
    [8,  5, 15,  900], // Lv9
    [8,  6, 18, 1000], // Lv10
    [9,  6, 18, 1100], // Lv11
    [9,  7, 20, 1200], // Lv12
    [10, 7, 20, 1300], // Lv13
    [10, 8, 24, 1400], // Lv14
    [11, 8, 24, 1500], // Lv15
    [11, 9, 28, 1600], // Lv16
    [12, 9, 28, 1700], // Lv17
    [12,10, 30, 1800], // Lv18
    [13,10, 30, 1900], // Lv19
    [13,12, 35, 2000], // Lv20
];

// BFS for ice-sliding: returns optimal moves or -1
function bfsSolveGrid(g, sz, sx, sy, ex, ey) {
    const key = (x,y) => x * sz + y;
    const q = [{x:sx, y:sy, m:0}];
    const vis = new Set(); vis.add(key(sx,sy));
    const dirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];
    let head = 0;
    while (head < q.length) {
        const {x,y,m} = q[head++];
        for (const d of dirs) {
            let nx=x, ny=y;
            while (true) {
                const tx=nx+d.dx, ty=ny+d.dy;
                if (tx<0||tx>=sz||ty<0||ty>=sz) break;
                if (g[ty][tx]===1) break;
                nx=tx; ny=ty;
                if (nx===ex && ny===ey) return m+1;
            }
            if (nx===x && ny===y) continue;
            if (vis.has(key(nx,ny))) continue;
            vis.add(key(nx,ny));
            q.push({x:nx,y:ny,m:m+1});
        }
    }
    return -1;
}

// Generate a level: place walls randomly, keep only if BFS gives target range
function generateMaze(levelIndex) {
    const [size, targetOpt, allowed, baseSeed] = LEVEL_SPECS[levelIndex];

    // Try multiple seeds until we find a good puzzle
    for (let attempt = 0; attempt < 500; attempt++) {
        const rng = mulberry32(baseSeed + attempt * 7);

        // Pick start and exit on opposite edges
        let sx, sy, ex, ey;
        const edge = Math.floor(rng() * 4);
        if (edge === 0) { // start left, exit right
            sx=0; sy=Math.floor(rng()*size); ex=size-1; ey=Math.floor(rng()*size);
        } else if (edge === 1) { // start top, exit bottom
            sx=Math.floor(rng()*size); sy=0; ex=Math.floor(rng()*size); ey=size-1;
        } else if (edge === 2) { // start right, exit left
            sx=size-1; sy=Math.floor(rng()*size); ex=0; ey=Math.floor(rng()*size);
        } else { // start bottom, exit top
            sx=Math.floor(rng()*size); sy=size-1; ex=Math.floor(rng()*size); ey=0;
        }

        // Build empty grid
        const g = [];
        for (let y=0;y<size;y++) { g[y]=[]; for(let x=0;x<size;x++) g[y][x]=0; }

        // Add walls one at a time
        const wallCount = Math.floor(size * size * (0.15 + rng() * 0.15));
        const walls = [];

        for (let w = 0; w < wallCount; w++) {
            const wx = Math.floor(rng() * size);
            const wy = Math.floor(rng() * size);
            if (wx===sx && wy===sy) continue;
            if (wx===ex && wy===ey) continue;
            if (g[wy][wx]===1) continue;
            g[wy][wx] = 1;
            // Check still solvable
            if (bfsSolveGrid(g,size,sx,sy,ex,ey) < 0) {
                g[wy][wx] = 0; // revert
            } else {
                walls.push([wx, wy]);
            }
        }

        const opt = bfsSolveGrid(g,size,sx,sy,ex,ey);
        if (opt >= targetOpt && opt <= targetOpt + 3) {
            return { size, start:[sx,sy], exit:[ex,ey], walls, optimal:opt, allowed };
        }
    }

    // Fallback: trivial solvable level
    return {
        size, start:[0,0], exit:[size-1,size-1],
        walls:[], optimal:2, allowed:10
    };
}

// Cache generated levels so they don't regenerate each play
const _levelCache = {};
function getLevel(idx) {
    if (!_levelCache[idx]) _levelCache[idx] = generateMaze(idx);
    return _levelCache[idx];
}


// ============================================================
//  BFS PATH FINDER — returns full path as direction list
// ============================================================
function bfsSolvePath(g, sz, sx, sy, ex, ey) {
    const key = (x,y) => x * sz + y;
    const dirs = [
        {dx:0,dy:-1,name:'up'},{dx:0,dy:1,name:'down'},
        {dx:-1,dy:0,name:'left'},{dx:1,dy:0,name:'right'}
    ];
    const q = [{x:sx, y:sy, path:[]}];
    const vis = new Set(); vis.add(key(sx,sy));
    let head = 0;
    while (head < q.length) {
        const {x,y,path} = q[head++];
        for (const d of dirs) {
            let nx=x, ny=y;
            while (true) {
                const tx=nx+d.dx, ty=ny+d.dy;
                if (tx<0||tx>=sz||ty<0||ty>=sz) break;
                if (g[ty][tx]===1) break;
                nx=tx; ny=ty;
                if (nx===ex && ny===ey) return [...path, {dir:d.name, from:{x,y}, to:{x:nx,y:ny}}];
            }
            if (nx===x && ny===y) continue;
            if (vis.has(key(nx,ny))) continue;
            vis.add(key(nx,ny));
            q.push({x:nx,y:ny,path:[...path, {dir:d.name, from:{x,y}, to:{x:nx,y:ny}}]});
        }
    }
    return null;
}

// ============================================================
//  GAME STATE
// ============================================================
let currentLevel = 0;
let grid = [];
let gridSize = 5;
let playerX = 0, playerY = 0;
let startX = 0, startY = 0;
let exitX = 0, exitY = 0;
let moveCount = 0;
let optimalMoves = 0;
let allowedMoves = 15;
let moveHistory = [];
let isAnimating = false;
let levelStars = {}; // level -> stars (1-3)
let unlockedLevel = 0;
let coins = 5;
let showingSolution = false;
let solutionPath = null;

// Load progress
try {
    const saved = JSON.parse(localStorage.getItem('luna-maze-progress') || '{}');
    levelStars = saved.stars || {};
    unlockedLevel = saved.unlocked || 0;
    coins = saved.coins ?? 5;
} catch(e) {}

function saveProgress() {
    localStorage.setItem('luna-maze-progress', JSON.stringify({
        stars: levelStars,
        unlocked: unlockedLevel,
        coins: coins
    }));
}

function updateCoinUI() {
    const el = document.getElementById('coinCount');
    el.textContent = coins;
    el.classList.remove('coin-anim');
    void el.offsetWidth;
    el.classList.add('coin-anim');
}

// ============================================================
//  CANVAS
// ============================================================
const canvas = document.getElementById('mazeCanvas');
const ctx = canvas.getContext('2d');
let cellSize = 40;

function resizeCanvas() {
    const container = document.querySelector('.maze-container');
    const maxW = Math.min(container.clientWidth - 16, 500);
    const maxH = container.clientHeight - 16;
    const maxCell = Math.floor(Math.min(maxW, maxH) / gridSize);
    cellSize = Math.max(20, Math.min(maxCell, 50));
    canvas.width = cellSize * gridSize;
    canvas.height = cellSize * gridSize;
    drawMaze();
}

// ============================================================
//  RENDERING
// ============================================================
let animPlayerX = 0, animPlayerY = 0;

function drawMaze() {
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // Background
    ctx.fillStyle = '#16162A';
    ctx.fillRect(0, 0, w, h);

    // Grid
    for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
            const px = x * cellSize;
            const py = y * cellSize;

            if (grid[y][x] === CELL_WALL) {
                // Wall - brick style, clearly distinct
                ctx.fillStyle = '#4A3B6B';
                ctx.fillRect(px + 1, py + 1, cellSize - 2, cellSize - 2);
                // Inner highlight
                ctx.fillStyle = '#5B4A7F';
                ctx.fillRect(px + 3, py + 3, cellSize - 6, cellSize - 6);
                // Cross pattern
                ctx.strokeStyle = '#6B5A90';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(px + 4, py + 4);
                ctx.lineTo(px + cellSize - 4, py + cellSize - 4);
                ctx.moveTo(px + cellSize - 4, py + 4);
                ctx.lineTo(px + 4, py + cellSize - 4);
                ctx.stroke();
                // Border
                ctx.strokeStyle = '#7B6AA0';
                ctx.lineWidth = 1;
                ctx.strokeRect(px + 1.5, py + 1.5, cellSize - 3, cellSize - 3);
            } else {
                // Floor
                ctx.fillStyle = (x + y) % 2 === 0 ? '#1E1E36' : '#1A1A30';
                ctx.fillRect(px, py, cellSize, cellSize);
            }

            // Exit
            if (x === exitX && y === exitY) {
                ctx.fillStyle = 'rgba(0, 206, 201, 0.2)';
                ctx.fillRect(px, py, cellSize, cellSize);
                // Glowing exit
                const t = Date.now() / 500;
                const glow = 0.4 + 0.3 * Math.sin(t);
                ctx.fillStyle = `rgba(0, 206, 201, ${glow})`;
                ctx.beginPath();
                ctx.arc(px + cellSize/2, py + cellSize/2, cellSize/3, 0, Math.PI*2);
                ctx.fill();
                // Arrow
                ctx.fillStyle = '#00CEC9';
                ctx.font = `${cellSize * 0.5}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('EXIT', px + cellSize/2, py + cellSize/2);
                ctx.font = `${cellSize * 0.3}px sans-serif`;
            }

            // Start marker
            if (x === startX && y === startY && !(playerX === startX && playerY === startY && moveCount === 0)) {
                ctx.fillStyle = 'rgba(108, 92, 231, 0.15)';
                ctx.fillRect(px, py, cellSize, cellSize);
                ctx.strokeStyle = 'rgba(108, 92, 231, 0.4)';
                ctx.lineWidth = 1;
                ctx.strokeRect(px + 2, py + 2, cellSize - 4, cellSize - 4);
            }
        }
    }

    // Grid lines (subtle)
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= gridSize; i++) {
        ctx.beginPath();
        ctx.moveTo(i * cellSize, 0);
        ctx.lineTo(i * cellSize, h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * cellSize);
        ctx.lineTo(w, i * cellSize);
        ctx.stroke();
    }

    // Player
    const ppx = animPlayerX * cellSize + cellSize/2;
    const ppy = animPlayerY * cellSize + cellSize/2;
    const pr = cellSize * 0.35;

    // Player glow
    const grad = ctx.createRadialGradient(ppx, ppy, 0, ppx, ppy, pr * 2);
    grad.addColorStop(0, 'rgba(108, 92, 231, 0.4)');
    grad.addColorStop(1, 'rgba(108, 92, 231, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ppx, ppy, pr * 2, 0, Math.PI*2);
    ctx.fill();

    // Player body
    ctx.fillStyle = '#6C5CE7';
    ctx.beginPath();
    ctx.arc(ppx, ppy, pr, 0, Math.PI*2);
    ctx.fill();

    // Player highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(ppx - pr*0.2, ppy - pr*0.2, pr*0.4, 0, Math.PI*2);
    ctx.fill();

    // Move trail (last position ghost)
    if (moveHistory.length > 0) {
        const last = moveHistory[moveHistory.length - 1];
        ctx.fillStyle = 'rgba(108, 92, 231, 0.15)';
        ctx.beginPath();
        ctx.arc(last.x * cellSize + cellSize/2, last.y * cellSize + cellSize/2, pr * 0.6, 0, Math.PI*2);
        ctx.fill();
    }

    // Solution path overlay
    if (showingSolution && solutionPath) {
        ctx.lineWidth = 3;
        ctx.setLineDash([6, 4]);

        for (let i = 0; i < solutionPath.length; i++) {
            const step = solutionPath[i];
            const fx = step.from.x * cellSize + cellSize/2;
            const fy = step.from.y * cellSize + cellSize/2;
            const tx = step.to.x * cellSize + cellSize/2;
            const ty = step.to.y * cellSize + cellSize/2;

            // Line
            const alpha = 0.5 + 0.3 * Math.sin(Date.now() / 300 + i);
            ctx.strokeStyle = `rgba(0, 206, 201, ${alpha})`;
            ctx.beginPath();
            ctx.moveTo(fx, fy);
            ctx.lineTo(tx, ty);
            ctx.stroke();

            // Step number
            const mx = (fx + tx) / 2;
            const my = (fy + ty) / 2;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.beginPath();
            ctx.arc(mx, my, cellSize * 0.22, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#00CEC9';
            ctx.font = `bold ${cellSize * 0.28}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(i + 1, mx, my);

            // Arrow head at destination
            const angle = Math.atan2(ty - fy, tx - fx);
            const aSize = cellSize * 0.18;
            ctx.fillStyle = `rgba(0, 206, 201, ${alpha})`;
            ctx.beginPath();
            ctx.moveTo(tx, ty);
            ctx.lineTo(tx - aSize * Math.cos(angle - 0.5), ty - aSize * Math.sin(angle - 0.5));
            ctx.lineTo(tx - aSize * Math.cos(angle + 0.5), ty - aSize * Math.sin(angle + 0.5));
            ctx.closePath();
            ctx.fill();
        }
        ctx.setLineDash([]);
    }
}

function animateLoop() {
    drawMaze();
    requestAnimationFrame(animateLoop);
}

// ============================================================
//  LEVEL LOADING
// ============================================================
function loadLevel(levelIndex) {
    currentLevel = levelIndex;
    const design = getLevel(levelIndex);
    gridSize = design.size;
    optimalMoves = design.optimal;
    allowedMoves = design.allowed;

    // Build grid
    grid = [];
    for (let y = 0; y < gridSize; y++) {
        grid[y] = [];
        for (let x = 0; x < gridSize; x++) {
            grid[y][x] = CELL_EMPTY;
        }
    }

    // Place walls
    for (const [wx, wy] of design.walls) {
        if (wy >= 0 && wy < gridSize && wx >= 0 && wx < gridSize) {
            grid[wy][wx] = CELL_WALL;
        }
    }

    // Start & exit
    startX = design.start[0];
    startY = design.start[1];
    exitX = design.exit[0];
    exitY = design.exit[1];
    grid[exitY][exitX] = CELL_EXIT;

    // Player
    playerX = startX;
    playerY = startY;
    animPlayerX = startX;
    animPlayerY = startY;
    moveCount = 0;
    moveHistory = [];
    isAnimating = false;
    showingSolution = false;
    solutionPath = null;

    // UI
    document.getElementById('levelBadge').textContent = `Lv.${levelIndex + 1}`;
    document.getElementById('gridSizeLabel').textContent = `${gridSize}x${gridSize}`;
    document.getElementById('coinCount').textContent = coins;
    updateUI();
    resizeCanvas();
}

function updateUI() {
    document.getElementById('moveCount').textContent = moveCount;
    document.getElementById('optimalCount').textContent = optimalMoves;
    const remaining = allowedMoves - moveCount;
    const remainEl = document.getElementById('remainCount');
    remainEl.textContent = remaining;
    remainEl.className = 'info-value ' + (remaining <= 3 ? 'danger' : 'remaining');
}

// ============================================================
//  MOVEMENT
// ============================================================
function slide(dirKey) {
    if (isAnimating) return;
    const dir = DIR[dirKey];
    if (!dir) return;

    let nx = playerX, ny = playerY;
    let moved = false;
    let reachedExit = false;

    while (true) {
        const tx = nx + dir.dx;
        const ty = ny + dir.dy;
        if (tx < 0 || tx >= gridSize || ty < 0 || ty >= gridSize) break;
        if (grid[ty][tx] === CELL_WALL) break;
        nx = tx;
        ny = ty;
        moved = true;
        if (nx === exitX && ny === exitY) {
            reachedExit = true;
            break;
        }
    }

    if (!moved) { playBump(); return; }

    playSlide();
    // Save history
    moveHistory.push({ x: playerX, y: playerY });
    moveCount++;

    // Animate
    isAnimating = true;
    const fromX = playerX, fromY = playerY;
    playerX = nx;
    playerY = ny;

    const duration = 150 + Math.max(Math.abs(nx - fromX), Math.abs(ny - fromY)) * 30;
    const startTime = performance.now();

    function animate(now) {
        const t = Math.min(1, (now - startTime) / duration);
        const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic
        animPlayerX = fromX + (nx - fromX) * ease;
        animPlayerY = fromY + (ny - fromY) * ease;

        if (t < 1) {
            requestAnimationFrame(animate);
        } else {
            animPlayerX = nx;
            animPlayerY = ny;
            isAnimating = false;
            updateUI();

            if (reachedExit) {
                playWin();
                onWin();
            } else if (moveCount >= allowedMoves) {
                playFail();
                onFail();
            }
        }
    }
    requestAnimationFrame(animate);
    updateUI();

    // Button feedback
    const btnId = { up: 'btnUp', down: 'btnDown', left: 'btnLeft', right: 'btnRight' };
    const btn = document.getElementById(btnId[dirKey]);
    if (btn) {
        btn.classList.add('active');
        setTimeout(() => btn.classList.remove('active'), 120);
    }
}

function undo() {
    if (isAnimating || moveHistory.length === 0) return;
    playUndo();
    const prev = moveHistory.pop();
    playerX = prev.x;
    playerY = prev.y;
    animPlayerX = prev.x;
    animPlayerY = prev.y;
    moveCount--;
    updateUI();
    drawMaze();
}

// ============================================================
//  WIN / FAIL
// ============================================================
function onWin() {
    let stars = 1;
    if (moveCount <= optimalMoves) stars = 3;
    else if (moveCount <= optimalMoves * 1.5) stars = 2;

    // Save + coin reward
    const prevStars = levelStars[currentLevel] || 0;
    if (stars > prevStars) {
        coins += stars;
        levelStars[currentLevel] = stars;
        setTimeout(playCoin, 400);
    }
    if (currentLevel >= unlockedLevel) unlockedLevel = currentLevel + 1;
    saveProgress();
    updateCoinUI();

    // 루나 홈페이지 코인 +1 적립
    try {
        const lunaCoins = parseInt(localStorage.getItem('luna_coins') || '0') + 1;
        localStorage.setItem('luna_coins', lunaCoins);
    } catch(e) {}

    // Show modal
    document.getElementById('winStars').textContent =
        (stars >= 1 ? '\u2B50' : '\u2606') +
        (stars >= 2 ? '\u2B50' : '\u2606') +
        (stars >= 3 ? '\u2B50' : '\u2606');
    document.getElementById('winMoves').textContent = moveCount;
    document.getElementById('winOptimal').textContent = optimalMoves;

    if (stars === 3) {
        document.getElementById('winTitle').textContent = 'Perfect!';
        document.getElementById('winMsg').textContent = 'You found the optimal path!';
    } else if (stars === 2) {
        document.getElementById('winTitle').textContent = 'Great!';
        document.getElementById('winMsg').textContent = 'Close to optimal! Can you do better?';
    } else {
        document.getElementById('winTitle').textContent = 'Clear!';
        document.getElementById('winMsg').textContent = `Optimal is ${optimalMoves} moves. Try again?`;
    }

    document.getElementById('winNext').style.display = currentLevel < 19 ? '' : 'none';
    document.getElementById('winModal').classList.add('show');
}

function onFail() {
    document.getElementById('failModal').classList.add('show');
}

// ============================================================
//  LEVEL SELECT
// ============================================================
function showLevelSelect() {
    const grid = document.getElementById('levelGrid');
    grid.innerHTML = '';
    for (let i = 0; i < 20; i++) {
        const cell = document.createElement('div');
        cell.className = 'level-cell';
        if (i === currentLevel) cell.classList.add('current');
        if (i > unlockedLevel) cell.classList.add('locked');

        const num = document.createElement('div');
        num.className = 'lnum';
        num.textContent = i > unlockedLevel ? '\uD83D\uDD12' : (i + 1);
        cell.appendChild(num);

        if (levelStars[i]) {
            const s = document.createElement('div');
            s.className = 'lstars';
            s.textContent = '\u2B50'.repeat(levelStars[i]) + '\u2606'.repeat(3 - levelStars[i]);
            cell.appendChild(s);
        }

        if (i <= unlockedLevel) {
            cell.addEventListener('click', () => {
                document.getElementById('levelModal').classList.remove('show');
                loadLevel(i);
            });
        }
        grid.appendChild(cell);
    }
    document.getElementById('levelModal').classList.add('show');
}

// ============================================================
//  EVENT HANDLERS
// ============================================================

// Keyboard
document.addEventListener('keydown', (e) => {
    const map = {
        ArrowUp: 'up', ArrowDown: 'down',
        ArrowLeft: 'left', ArrowRight: 'right',
        w: 'up', s: 'down', a: 'left', d: 'right',
        W: 'up', S: 'down', A: 'left', D: 'right'
    };
    if (map[e.key]) {
        e.preventDefault();
        slide(map[e.key]);
    }
    if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        undo();
    }
});

// D-Pad buttons
document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn => {
    const dir = btn.dataset.dir;
    btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        slide(dir);
    });
});

// Touch swipe on canvas
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (e.changedTouches.length === 0) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const threshold = 20;
    if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;

    if (Math.abs(dx) > Math.abs(dy)) {
        slide(dx > 0 ? 'right' : 'left');
    } else {
        slide(dy > 0 ? 'down' : 'up');
    }
}, { passive: false });

// Buttons
document.getElementById('btnReset').addEventListener('click', () => { playBtn(); loadLevel(currentLevel); });
document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnLevels').addEventListener('click', () => { playBtn(); showLevelSelect(); });

// Show Solution (1 coin)
document.getElementById('btnSolve').addEventListener('click', () => {
    if (showingSolution) {
        showingSolution = false;
        solutionPath = null;
        return;
    }
    if (coins < 1) {
        alert('Not enough coins!');
        return;
    }
    // Build current grid for BFS (without EXIT marker interference)
    const g = [];
    for (let y=0;y<gridSize;y++) { g[y]=[]; for(let x=0;x<gridSize;x++) g[y][x] = grid[y][x]===CELL_WALL?1:0; }
    const path = bfsSolvePath(g, gridSize, playerX, playerY, exitX, exitY);
    if (path && path.length > 0) {
        coins--;
        saveProgress();
        updateCoinUI();
        playCoin();
        solutionPath = path;
        showingSolution = true;
    } else {
        alert('No path found! Try resetting.');
    }
});

// Skip level
document.getElementById('btnSkip').addEventListener('click', () => {
    if (currentLevel >= unlockedLevel) unlockedLevel = currentLevel + 1;
    saveProgress();
    if (currentLevel < 19) {
        loadLevel(currentLevel + 1);
    } else {
        alert('Last level!');
    }
});

// Modal buttons
document.getElementById('winNext').addEventListener('click', () => {
    document.getElementById('winModal').classList.remove('show');
    if (currentLevel < 19) loadLevel(currentLevel + 1);
});
document.getElementById('winRetry').addEventListener('click', () => {
    document.getElementById('winModal').classList.remove('show');
    loadLevel(currentLevel);
});
document.getElementById('failRetry').addEventListener('click', () => {
    document.getElementById('failModal').classList.remove('show');
    loadLevel(currentLevel);
});
document.getElementById('failLevels').addEventListener('click', () => {
    document.getElementById('failModal').classList.remove('show');
    showLevelSelect();
});
document.getElementById('levelClose').addEventListener('click', () => {
    document.getElementById('levelModal').classList.remove('show');
});

// Close modals on overlay click
['winModal', 'failModal', 'levelModal'].forEach(id => {
    document.getElementById(id).addEventListener('click', (e) => {
        if (e.target === e.currentTarget) {
            e.currentTarget.classList.remove('show');
        }
    });
});

// Resize
window.addEventListener('resize', resizeCanvas);

// ============================================================
//  INIT
// ============================================================
document.getElementById('tutStart').addEventListener('click', () => {
    document.getElementById('tutModal').classList.remove('show');
});
if (localStorage.getItem('luna-maze-seen')) {
    document.getElementById('tutModal').classList.remove('show');
}
localStorage.setItem('luna-maze-seen', '1');

loadLevel(unlockedLevel < 20 ? unlockedLevel : 0);
animateLoop();

</script>
